services:
  postgres:
    image: postgres:16
    container_name: sniff-n-frolic-api
    restart: unless-stopped
    environment:
      POSTGRES_USER: snf
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sniff_n_frolic
    ports:
      - "5432:5432"
    volumes:
      - snf_api_db:/var/lib/postgresql/data

volumes:
  snf_api_db: